  homedashboardservice:
    build:
      context: ..
      dockerfile: Services/HomeDashboardService/Dockerfile
    container_name: rankup-homedashboardservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
    depends_on:
      - userservice
      - examservice
    networks:
      - rankup-network
    restart: unless-stopped

  testservice:
    build:
      context: ..
      dockerfile: Services/TestService/Dockerfile
    container_name: rankup-testservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
    networks:
      - rankup-network
    restart: unless-stopped

networks:
  rankup-network:
    driver: bridge

volumes:
  sqlserver-data:
