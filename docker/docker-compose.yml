# RankUpAPI - Microservices Docker Compose
# Run from repo root: docker compose -f docker/docker-compose.yml up -d

version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rankup-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-RankUp@ProdPass2026}"
      MSSQL_PID: "Developer"
    ports:
      - "${MSSQL_PORT:-7864}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - rankup-network



  # ---------------------------------------------------------------------------
  # API Gateway (Ocelot) - single entry point
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ..
      dockerfile: Services/GatewayAPI/Dockerfile
    container_name: rankup-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      OCELOT_CONFIG: ocelot.docker.json
    ports:
      - "${GATEWAY_PORT:-5087}:80"
    depends_on:
      userservice:
        condition: service_started
      examservice:
        condition: service_started
    networks:
      - rankup-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Microservices (each listens on port 80 inside container)
  # ---------------------------------------------------------------------------
  userservice:
    build:
      context: ..
      dockerfile: Services/UserService/Dockerfile
    container_name: rankup-userservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__UserServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${USERSERVICE_DB_NAME:-RankUp_UserDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - sqlserver
    networks:
      - rankup-network
    restart: unless-stopped

  examservice:
    build:
      context: ..
      dockerfile: Services/ExamService/Dockerfile
    container_name: rankup-examservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__ExamServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${EXAMSERVICE_DB_NAME:-RankUp_ExamDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - sqlserver
    networks:
      - rankup-network
    restart: unless-stopped

  adminservice:
    build:
      context: ..
      dockerfile: Services/AdminService/Dockerfile
    container_name: rankup-adminservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__AdminServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${ADMINSERVICE_DB_NAME:-RankUp_AdminDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - sqlserver
    networks:
      - rankup-network
    restart: unless-stopped

  masterservice:
    build:
      context: ..
      dockerfile: Services/MasterService/Dockerfile
    container_name: rankup-masterservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__MasterServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${MASTERSERVICE_DB_NAME:-RankUp_MasterDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - sqlserver
    networks:
      - rankup-network
    restart: unless-stopped

  questionservice:
    build:
      context: ..
      dockerfile: Services/QuestionService/Dockerfile
    container_name: rankup-questionservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__QuestionServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${QUESTIONSERVICE_DB_NAME:-RankUp_QuestionDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - sqlserver
    networks:
      - rankup-network
    restart: unless-stopped

  quizservice:
    build:
      context: ..
      dockerfile: Services/QuizService/Dockerfile
    container_name: rankup-quizservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__QuizServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${QUIZSERVICE_DB_NAME:-RankUp_QuizDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - sqlserver
    networks:
      - rankup-network
    restart: unless-stopped

  subscriptionservice:
    build:
      context: ..
      dockerfile: Services/SubscriptionService/Dockerfile
    container_name: rankup-subscriptionservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__SubscriptionServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${SUBSCRIPTIONSERVICE_DB_NAME:-RankUp_SubscriptionDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - sqlserver
    networks:
      - rankup-network
    restart: unless-stopped

  paymentservice:
    build:
      context: ..
      dockerfile: Services/PaymentService/Dockerfile
    container_name: rankup-paymentservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__PaymentServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${PAYMENTSERVICE_DB_NAME:-RankUp_PaymentDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - sqlserver
    networks:
      - rankup-network
    restart: unless-stopped

  homedashboardservice:
    build:
      context: ..
      dockerfile: Services/HomeDashboardService/Dockerfile
    container_name: rankup-homedashboardservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__HomeDashboardServiceConnection: "Server=${DB_SERVER:-sqlserver};Database=${HOMEDASHBOARDSERVICE_DB_NAME:-RankUp_HomeDashboardDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;"
    depends_on:
      - userservice
      - examservice
    networks:
      - rankup-network
    restart: unless-stopped

  testservice:
    build:
      context: ..
      dockerfile: Services/TestService/Dockerfile
    container_name: rankup-testservice
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=${DB_SERVER:-sqlserver};Database=${TESTSERVICE_DB_NAME:-RankUpAPI_TestService};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-RankUp@SecurePass1};TrustServerCertificate=True;MultipleActiveResultSets=true"
    networks:
      - rankup-network
    restart: unless-stopped

# ✅ OUTSIDE services
networks:
  rankup-network:
    driver: bridge

volumes:
  sqlserver-data:
